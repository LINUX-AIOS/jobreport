<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MFK – Manpower For Careers | Saudi Arabia Job Portal</title>

<meta name="description" content="MFK Manpower For Careers job portal for Saudi Arabia. View applicants and manage job applications in Jeddah, Riyadh and across KSA.">

<meta name="keywords" content="jobs Saudi Arabia, manpower jobs KSA, MFK careers, driver jobs Riyadh, cleaner jobs Jeddah, apply jobs Saudi Arabia">

<style>
:root {
    --bg: #000;
    --text: #fff;
    --card: #0a0a0a;
    --accent: #238a8b;
    --muted: #aaa;
    --border: #238a8b;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: var(--card);
    border-bottom: 2px solid var(--accent);
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo img {
    width: 55px;
    height: 55px;
    object-fit: contain;
    border-radius: 6px;
}

.logo h1 {
    margin: 0;
    font-size: 18px;
    color: var(--accent);
}

.btn {
    padding: 10px 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 5px;
    text-decoration: none;
    cursor: pointer;
    font-size: 14px;
    margin-left: 8px;
}

/* STATS */
.stats {
    display: flex;
    gap: 10px;
    padding: 15px;
}

.box {
    background: var(--card);
    border: 1px solid var(--accent);
    padding: 10px;
    border-radius: 6px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #222;
    padding: 10px;
    font-size: 14px;
}

th {
    color: var(--accent);
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
}
</style>

</head>

<body>

<header>
    <div class="logo">
        <!-- YOUR LOGO FILE (UPLOAD IN GITHUB AS logo.png) -->
        <img src="logo.png" alt="MFK Logo">
        <h1>MFK Dashboard</h1>
    </div>

    <div>
        <button class="btn" onclick="location.reload()">Refresh</button>

        <!-- PLACEHOLDER WEBSITE BUTTON -->
        <a class="btn" href="YOUR_WEBSITE_LINK_HERE" target="_blank">
            Visit Website
        </a>
    </div>
</header>

<!-- STATS -->
<div class="stats">
    <div class="box" id="total">Loading...</div>
</div>

<!-- TABLE -->
<table>
    <thead>
        <tr>
            <th>Full Name</th>
            <th>Sector</th>
            <th>Position</th>
            <th>Experience</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>

<!-- FOOTER PASSWORD -->
<div class="footer" onclick="showPassHint()">
Made by Mohammad Faizan Khan
</div>

<script>

function showPassHint(){
    let p = prompt("Enter admin password:");
    if(p === "FaizanKhan"){
        alert("Access granted");
    } else {
        alert("Wrong password");
    }
}

fetch("https://script.google.com/macros/s/AKfycbwQrfA-SXl-yMQPcC3VIerNMAM2U7j9CLvVtWf6IXmHJSVX6CWSHwvB2Lo4qECk0oE45A/exec")
.then(res => res.json())
.then(data => {

    document.getElementById("total").innerHTML = "Total Applicants: " + data.length;

    let table = document.getElementById("data");

    data.forEach(item => {
        table.innerHTML += `
        <tr>
            <td>${item["Full Name"]}</td>
            <td>${item["Which sector are you applying for?"]}</td>
            <td>${item["Position"]}</td>
            <td>${item["Total Experience (Years)"]}</td>
            <td>${item["Experience Details (Optional)"]}</td>
        </tr>`;
    });

});

</script>

</body>
</html>
